{% extends "layout.html" %}
{% block title %}History{% endblock %}

{% block sidebar %}

<a href="/dashboard" class="flex items-center px-4 py-2 rounded-lg hover:bg-cyan-500/20 hover:text-white transition">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-width="2" d="M3 3h7v7H3V3zm11 0h7v4h-7V3zM14 9h7v12h-7V9zM3 14h7v7H3v-7z" />
    </svg>
    Dashboard
</a>

<a href="/analytics" class="flex items-center px-4 py-2 rounded-lg hover:bg-cyan-500/20 hover:text-white transition">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-width="2" d="M11 3v18m-4-4l4 4 4-4M3 10h18" />
    </svg>
    Analytics
</a>

<a href="/history-page" class="flex items-center px-4 py-2 rounded-lg hover:bg-cyan-500/20 hover:text-white transition">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-6-8.94" />
    </svg>
    History
</a>

<a href="/settings" class="flex items-center px-4 py-2 rounded-lg hover:bg-cyan-500/20 hover:text-white transition">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-width="2" d="M12 15v2m0 4h.01M19.4 15a7.5 7.5 0 10-14.8 0" />
    </svg>
    Settings
</a>

{% endblock %}


{% block content %}

<h1 class="text-3xl font-semibold mb-8">History Logs</h1>

<div class="bg-white/5 backdrop-blur-md border border-white/10 p-6 rounded-xl overflow-x-auto">
    <table class="w-full text-left text-sm">
        <thead class="border-b border-white/10 text-gray-400">
            <tr>
                <th class="py-2">Time</th>
                <th>Temp (°C)</th>
                <th>Humidity (%)</th>
                <th>AQI</th>
                <th>People</th>
                <th>Stress</th>
            </tr>
        </thead>
        <tbody id="historyTable"></tbody>
    </table>
</div>

{% endblock %}

{% block scripts %}
<script>
    window.onload = function () {

        fetch("/history")
            .then(res => res.json())
            .then(data => {

                const table = document.getElementById("historyTable");
                table.innerHTML = "";

                if (!data || data.length === 0) {
                    table.innerHTML = `
                <tr>
                    <td colspan="6" class="py-4 text-center text-gray-400">
                        No history data available
                    </td>
                </tr>
            `;
                    return;
                }

                data.forEach(row => {
                    table.innerHTML += `
            <tr class="border-b border-white/10 hover:bg-white/5 transition">
                <td class="py-2">${row.time}</td>
                <td>${row.temperature}</td>
                <td>${row.humidity}</td>
                <td>${row.air}</td>
                <td>${row.people}</td>
                <td class="font-semibold ${row.stress === "HIGH" ? "text-red-400" :
                            row.stress === "MEDIUM" ? "text-orange-400" :
                                "text-green-400"
                        }">
                    ${row.stress}
                </td>
            </tr>`;
                });

            })
            .catch(err => console.error("History fetch error:", err));

    };
</script>
{% endblock %}
