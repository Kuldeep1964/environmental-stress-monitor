<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-gradient-to-r from-[#0f2027] via-[#203a43] to-[#2c5364] text-white">

<div class="flex h-screen">

    <!-- Sidebar -->
    <div class="w-64 bg-gradient-to-b from-[#0f172a] to-[#111827] p-6 flex flex-col shadow-2xl border-r border-white/10">
        <h2 class="text-2xl font-bold mb-10 tracking-wide">Environmental</h2>

       
            {% block sidebar %}{% endblock %}
        

        <div class="mt-auto pt-10 text-xs text-gray-500">
            Admin Panel
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-8 overflow-y-auto">
        {% block content %}{% endblock %}
    </div>

</div>

{% block scripts %}{% endblock %}

</body>
</html>
