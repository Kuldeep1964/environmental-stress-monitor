{% extends "layout.html" %}
{% block title %}Analytics{% endblock %}

{% block sidebar %}

<a href="/dashboard" class="flex items-center px-4 py-2 rounded-lg hover:bg-cyan-500/20 hover:text-white transition">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-width="2" d="M3 3h7v7H3V3zm11 0h7v4h-7V3zM14 9h7v12h-7V9zM3 14h7v7H3v-7z" />
    </svg>
    Dashboard
</a>

<a href="/analytics" class="flex items-center px-4 py-2 rounded-lg hover:bg-cyan-500/20 hover:text-white transition">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-width="2" d="M11 3v18m-4-4l4 4 4-4M3 10h18" />
    </svg>
    Analytics
</a>

<a href="/history-page" class="flex items-center px-4 py-2 rounded-lg hover:bg-cyan-500/20 hover:text-white transition">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-6-8.94" />
    </svg>
    History
</a>

<a href="/settings" class="flex items-center px-4 py-2 rounded-lg hover:bg-cyan-500/20 hover:text-white transition">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-width="2" d="M12 15v2m0 4h.01M19.4 15a7.5 7.5 0 10-14.8 0" />
    </svg>
    Settings
</a>

{% endblock %}
{% block content %}

<h1 class="text-3xl font-semibold mb-8">Analytics Overview</h1>

<div class="bg-white/5 backdrop-blur-md border border-white/10 p-6 rounded-xl">
    <canvas id="analyticsChart"></canvas>
</div>

{% endblock %}

{% block scripts %}
<script>
    window.onload = function () {

        fetch("/history")
            .then(res => res.json())
            .then(data => {

                if (!data || data.length === 0) {
                    console.log("No analytics data");
                    return;
                }

                const labels = data.map(d => d.time).reverse();
                const temp = data.map(d => d.temperature).reverse();
                const air = data.map(d => d.air).reverse();

                const ctx = document.getElementById("analyticsChart").getContext("2d");

                new Chart(ctx, {
                    type: "line",
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: "Temperature",
                                data: temp,
                                borderColor: "orange",
                                tension: 0.4
                            },
                            {
                                label: "AQI",
                                data: air,
                                borderColor: "cyan",
                                tension: 0.4
                            }
                        ]
                    },
                    options: {
                        plugins: {
                            legend: {
                                labels: { color: "white" }
                            }
                        },
                        scales: {
                            x: {
                                ticks: { color: "white" }
                            },
                            y: {
                                ticks: { color: "white" }
                            }
                        }
                    }
                });

            })
            .catch(err => console.error("Analytics fetch error:", err));

    };
</script>
{% endblock %}
