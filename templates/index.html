<!DOCTYPE html>
<html>

<head>
    <title>Environmental Monitoring Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gradient-to-r from-[#0f2027] via-[#203a43] to-[#2c5364] text-white">

    <div class="flex h-screen">

        <!-- Sidebar -->
        <div
            class="w-64 bg-gradient-to-b from-[#0f172a] to-[#111827] p-6 flex flex-col shadow-2xl border-r border-white/10">
            <h2 class="text-2xl font-bold mb-10 tracking-wide">Environmental</h2>

            <nav class="space-y-3 text-gray-400 text-sm">

                <a href="/dashboard"
                    class="flex items-center px-4 py-2 rounded-lg hover:bg-cyan-500/20 hover:text-white transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-width="2" d="M3 3h7v7H3V3zm11 0h7v4h-7V3zM14 9h7v12h-7V9zM3 14h7v7H3v-7z" />
                    </svg>
                    Dashboard
                </a>

                <a href="/analytics"
                    class="flex items-center px-4 py-2 rounded-lg hover:bg-cyan-500/20 hover:text-white transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-width="2" d="M11 3v18m-4-4l4 4 4-4M3 10h18" />
                    </svg>
                    Analytics
                </a>

                <a href="/history-page"
                    class="flex items-center px-4 py-2 rounded-lg hover:bg-cyan-500/20 hover:text-white transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-6-8.94" />
                    </svg>
                    History
                </a>

                <a href="/settings"
                    class="flex items-center px-4 py-2 rounded-lg hover:bg-cyan-500/20 hover:text-white transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-width="2" d="M12 15v2m0 4h.01M19.4 15a7.5 7.5 0 10-14.8 0" />
                    </svg>
                    Settings
                </a>

            </nav>

            <div class="mt-auto pt-10 text-xs text-gray-500">
                Admin Panel
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-8 overflow-y-auto">

            <!-- Topbar -->
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-semibold tracking-wide">
                    Environmental Monitoring Dashboard
                </h1>

                <div class="flex items-center space-x-6">
                    <div id="systemStatus" class="text-sm font-semibold text-green-400 animate-pulse">
                        ● System Online
                    </div>
                    <div id="lastUpdate" class="text-sm opacity-70">
                        --
                    </div>
                </div>
            </div>

            <!-- Metric Cards -->
            <div class="grid grid-cols-4 gap-6 mb-8">

                <!-- Temperature -->
             <div id="card-temp"
     class="metric-card bg-white/5 backdrop-blur-md border border-white/10 p-6 rounded-xl hover:scale-[1.02] transition duration-300">
                <div class="flex items-center justify-between">
                        <p class="text-sm text-gray-400">Temperature</p>

                        <!-- Fire Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-orange-400" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 3c2 3 4 4 4 8a4 4 0 11-8 0c0-4 2-5 4-8z" />
                        </svg>
                    </div>
                    <p id="temp" class="text-3xl font-bold mt-2">--</p>
                </div>

                <!-- Humidity -->
               <div id="card-hum"
     class="metric-card bg-white/5 backdrop-blur-md border border-white/10 p-6 rounded-xl hover:scale-[1.02] transition duration-300">
                    <div class="flex items-center justify-between">
                        <p class="text-sm text-gray-400">Humidity</p>

                        <!-- Droplet Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-400" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 3C8 8 6 10 6 13a6 6 0 0012 0c0-3-2-5-6-10z" />
                        </svg>
                    </div>
                    <p id="hum" class="text-3xl font-bold mt-2">--</p>
                </div>

                <!-- Air -->
               <div id="card-air"
     class="metric-card bg-white/5 backdrop-blur-md border border-white/10 p-6 rounded-xl hover:scale-[1.02] transition duration-300">
                    <div class="flex items-center justify-between">
                        <p class="text-sm text-gray-400">Air Quality</p>

                        <!-- Wind Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-cyan-400" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 12h13m-9 4h9m-6-8h6" />
                        </svg>
                    </div>
                    <p id="air" class="text-3xl font-bold mt-2">--</p>
                </div>

                <!-- People -->
               <div id="card-people"
     class="metric-card bg-white/5 backdrop-blur-md border border-white/10 p-6 rounded-xl hover:scale-[1.02] transition duration-300">
                    <div class="flex items-center justify-between">
                        <p class="text-sm text-gray-400">People Count</p>

                        <!-- Users Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
  <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" />
</svg>

                    </div>
                    <p id="people" class="text-3xl font-bold mt-2">--</p>
                </div>

            </div>

            <!-- Chart & Gauge -->
            <div class="grid grid-cols-3 gap-6 mb-8">

                <div class="col-span-2 bg-white/5 backdrop-blur-md border border-white/10 p-6 rounded-xl">
                    <h2 class="mb-4 text-lg font-semibold">Environment Trends</h2>
                    <canvas id="envChart"></canvas>
                </div>

                <div class="bg-white/5 backdrop-blur-md border border-white/10 p-6 rounded-xl">
                    <div class="relative flex justify-center">
                        <canvas id="stressGauge" width="200" height="200"></canvas>
                        <div class="absolute bottom-8 text-2xl font-bold" id="stressText"></div>
                    </div>
                    <p id="suggestion" class="text-center mt-4 text-sm opacity-70"></p>
                </div>

            </div>

            <!-- History Table -->
            <div class="bg-white/5 backdrop-blur-md border border-white/10 p-6 rounded-xl">
                <h2 class="mb-4 text-lg font-semibold">Latest Activity</h2>
                <table class="w-full text-left text-sm border-collapse">
                    <thead class="border-b border-white/10 text-gray-400">
                        <tr>
                            <th class="py-2">Time</th>
                            <th>Temp</th>
                            <th>Humidity</th>
                            <th>AQI</th>
                            <th>People</th>
                            <th>Stress</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable"></tbody>
                </table>
            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
